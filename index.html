  <style>
    /* --- SISTEMA DE DESIGN DE FOLHA DE PAPEL (SEM BOXES DE CONTORNO) --- */
    :root {
      --bg-paper: #FAF8F5;
      /* off-white aconchegante */
      --text-dark: #2E2C29;
      /* cinza escuro/soot */
      --text-muted: #7E7870;
      /* cinza médio */
      --accent: #8C7862;
      /* warm sepia gold */
      --accent-hover: #73614F;
      --accent-light: #EFECE6;
      --border-soft: #EBE7DF;

      --font-serif-title: 'Forum', Georgia, serif;
      --font-serif-body: 'EB Garamond', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-paper);
      color: var(--text-dark);
      font-family: var(--font-serif-body);
      font-size: 1.2rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding: 60px 40px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* --- CABEÇALHO SÓBRIO --- */
    header {
      text-align: center;
      margin-bottom: 50px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border-soft);
    }

    header h1 {
      font-family: var(--font-serif-title);
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    header p {
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* --- NAVEGAÇÃO MINIMALISTA (SEM BORDAS OU BOXES) --- */
    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 45px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-link {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 4px;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .nav-link.active {
      color: var(--text-dark);
      border-bottom: 2px solid var(--accent);
    }

    /* --- CONTAINER DE CONTEÚDO --- */
    .content-area {
      min-height: 400px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* --- CONTROLES DE FILTRO/SELEÇÃO DE ANO --- */
    .sub-nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 35px;
      font-family: var(--font-sans);
      font-size: 0.85rem;
    }

    .sub-link {
      background: none;
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 16px;
      transition: all 0.2s ease;
    }

    .sub-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sub-link.active {
      background-color: var(--accent);
      color: var(--bg-paper);
      border-color: var(--accent);
    }

    /* --- ESTILOS DE RENDERIZAÇÃO DO MARKDOWN (EB GARAMOND) --- */
    .markdown-body {
      font-family: var(--font-serif-body);
      color: var(--text-dark);
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      font-family: var(--font-serif-title);
      font-weight: 400;
      color: var(--text-dark);
      margin-top: 30px;
      margin-bottom: 15px;
    }

    .markdown-body h1 {
      font-size: 2.2rem;
    }

    .markdown-body h2 {
      font-size: 1.8rem;
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 6px;
    }

    .markdown-body h3 {
      font-size: 1.4rem;
    }

    .markdown-body p {
      margin-bottom: 20px;
      text-align: justify;
    }

    .markdown-body blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 20px;
      margin: 20px 0;
      font-style: italic;
      color: #4a4742;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin-left: 25px;
      margin-bottom: 20px;
    }

    .markdown-body li {
      margin-bottom: 8px;
    }

    /* Tabela Markdown Estilo Folha de Livro Antigo */
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 30px 0;
      font-size: 1.1rem;
    }

    .markdown-body th {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 10px;
      border-bottom: 2px solid var(--text-dark);
      color: var(--text-dark);
      text-align: left;
    }

    .markdown-body td {
      padding: 14px 10px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: top;
    }

    /* --- ABA LIÇÕES: SANFONA / ACCORDION E CABEÇALHOS --- */
    .lesson-accordion-wrapper {
      margin-top: 10px;
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 15px;
    }

    .lesson-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 12px;
    }

    .lesson-accordion-trigger {
      background: none;
      border: none;
      font-family: var(--font-serif-title);
      font-size: 1.8rem;
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      text-align: left;
      outline: none;
      transition: color 0.2s;
    }

    .lesson-accordion-trigger:hover {
      color: var(--accent);
    }

    .arrow-icon {
      font-size: 0.95rem;
      transition: transform 0.2s ease;
      color: var(--text-muted);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      gap: 12px;
    }

    .toggle-option {
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
      padding: 4px 8px;
    }

    .toggle-option.active {
      color: var(--text-dark);
      border-bottom: 1px solid var(--text-dark);
    }

    /* --- ABA LIÇÕES: SANFONA / ACCORDION E CABEÇALHOS --- */

    .toggle-option.active {

      border-bottom: 1px solid var(--text-dark);
    }

    /* --- NOTIFICAÇÃO --- */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: var(--text-dark);
      color: var(--bg-paper);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      padding: 12px 24px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .toast.active {
      opacity: 1;
    }

    /* --- MODAL DA LIÇÃO --- */
    .lesson-modal {
      border: none;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      margin: auto;
      /* Centraliza nativamente */
      padding: 0;
      background-color: var(--bg-paper);
    }

    .lesson-modal::backdrop {
      background-color: rgba(46, 44, 41, 0.6);
      backdrop-filter: blur(4px);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-soft);
      background-color: var(--bg-paper);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text-dark);
    }

    .modal-body {
      padding: 30px;
      overflow-y: auto;
      /* Subtrai o tamanho do header para não quebrar o layout */
      max-height: calc(90vh - 80px);
    }

    /* --- BOTÃO LER NO CRONOGRAMA --- */
    .btn-ler {
      background-color: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 15px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-family: var(--font-sans);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-ler:hover {
      background-color: var(--accent);
      color: var(--bg-paper);
    }

    /* --- RESPONSIVIDADE PARA CELULAR --- */
    @media (max-width: 768px) {
      body {
        padding: 20px 15px;
        font-size: 1.1rem;
      }

      header {
        margin-bottom: 30px;
        padding-bottom: 20px;
      }

      header h1 {
        font-size: 2rem;
      }

      nav {
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 25px;
      }

      .sub-nav {
        flex-wrap: wrap;
        gap: 8px;
      }

      /* Tabelas responsivas com rolagem horizontal nativa */
      .markdown-body table {
        display: block;
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
      }

      .markdown-body th,
      .markdown-body td {
        padding: 12px 10px;
      }

      #lesson-modal {
        width: 95%;
        padding: 20px;
        margin: 2vh auto;
      }
    }
  </style>
</head>

> Eu me lembro! eu me lembro! – Era pequeno

**Objetivo**: Realizar a revisão diagnóstica e identificação das classes verbais e relacionais (verbo, advérbio, preposição e conjunção) sob contexto.

### 1) Conteúdo

* **Classes Verbais e Relacionais**: São as palavras que expressam dinamicidade, circunstâncias ou ligam os termos de uma frase.
  1. **Verbo**: Indica ação, estado, mudança de estado ou fenômeno da natureza situados no tempo. *(Ex: \`lembro\`, \`brincava\`, \`bramia\`, \`disse\`, \`vemos\`, \`é\`)*
  2. **Advérbio**: Palavra invariável que expressa uma circunstância (tempo, modo, lugar, negação, intensidade) modificando um verbo, adjetivo ou outro advérbio. *(Ex: \`não\` [negação], \`mais\` [intensidade])*
  3. **Preposição**: Liga duas palavras estabelecendo uma relação de dependência entre elas. *(Ex: \`para\` o céu, \`de\` Abreu, \`na\` [em+a] praia)*
  4. **Conjunção**: Conecta orações ou termos coordenados estabelecendo relações de sentido (soma, alternância, oposição, etc.). *(Ex: \`e\` [adição], \`ou\` [alternância])*

**Texto de Ancoragem**: *"Deus"* (Casimiro de Abreu)

### 1) Conteúdo

* **Variação de Classe sob Contexto**: Na língua portuguesa, a classe de uma palavra não é fixa absoluta. É a frase que define sua classificação.
* **Substantivação**: Ocorre quando colocamos um artigo ou outro determinante antes de um adjetivo ou verbo, transformando-o em substantivo.
  * *Verbo -> Substantivo*: O infinitivo \`ser\` torna-se substantivo em *"Um **Ser** que nós não vemos"*.
  * *Adjetivo -> Substantivo*: O adjetivo \`sereno\` torna-se substantivo em *"O **sereno** da manhã cobriu a grama"*.
* **Adjetivação**: Ocorre quando um substantivo passa a qualificar outro substantivo no contexto.
  * *Exemplo*: *"O menino tinha um olhar **mar**"* (o substantivo *mar* atua como adjetivo para qualificar a imensidão/profundidade do olhar).

### 1) Conteúdo

* **Revisão Geral das Classes de Palavras no Poema**:
  * **Substantivos**: Nomes que identificam os seres e elementos. *(Ex: \`praia\`, \`mar\`, \`mãe\`, \`vento\`, \`Deus\`)*
  * **Adjetivos**: Termos que qualificam ou caracterizam. *(Ex: \`altivo\`, \`branca\`, \`sereno\`, \`dura\`, \`insano\`, \`forte\`)*
  * **Artigos**: Determinantes definidos ou indefinidos. *(Ex: \`o\` [mar], \`a\` [branca escuma], \`um\` [Ser])*
  * **Pronomes**: Indicam posse ou a pessoa gramatical. *(Ex: \`Eu\`, \`me\`, \`minha\`, \`nós\`, \`este\`)*
  * **Verbos**: Motores da ação e do tempo. *(Ex: \`lembro\`, \`brincava\`, \`bramia\`, \`sacudia\`, \`disse\`, \`vemos\`, \`tememos\`, \`respondeu\`)*
  * **Advérbios**: Circunstâncias de tempo, negação e intensidade. *(Ex: \`não\`, \`mais\`)*
  * **Preposições**: Elementos de ligação de dependência. *(Ex: \`em\`, \`para\`, \`de\` [na contração \`na\` e \`do\`])*
  * **Conjunções**: Conectivos de coordenação ou subordinação. *(Ex: \`e\`, \`ou\`, \`que\`)*

### 1) Conteúdo

* **Eu me lembro! eu me lembro! – Era pequeno**: Saudade e lembrança da infância do poeta.

        const aula3_8Text = `# 8º Ano — Aula 3: Morfologia vs. Sintaxe (Classes Nominais)
**Texto de Ancoragem**: *"Deus"* (Casimiro de Abreu)  
**Objetivo**: Compreender a diferença entre classificação morfológica e sintática, identificando as funções sintáticas das classes nominais (sujeito, objetos e adjunto adnominal).

---

### 1) Conteúdo

* **Morfologia vs. Sintaxe (Morfossintaxe)**:
  * **Morfologia**: Classifica a palavra isoladamente (o que ela **é** no dicionário). *Ex: a palavra \`mar\` é um substantivo.*
  * **Sintaxe**: Classifica o papel que a palavra desempenha na oração (o que ela **faz**). *Ex: na oração "O mar bramia", a palavra \`mar\` funciona como **sujeito**.*
* **Funções Sintáticas Nominais**:
  1. **Sujeito**: Termo sobre o qual se faz a declaração principal. *(Ex: "**O mar** bramia." Núcleo: \`mar\`)*
  2. **Objeto Direto (OD)**: Completa o sentido de um verbo sem preposição obrigatória. *(Ex: "...sacudia **a branca escuma**..." Núcleo do OD: \`escuma\`)*
  3. **Objeto Indireto (OI)**: Completa o sentido de um verbo exigindo preposição. *(Ex: "...disse **a minha mãe**..." Preposição: \`a\`)*
  4. **Adjunto Adnominal (ADN)**: Caracteriza ou determina um substantivo diretamente. *(Ex: "A **branca** escuma para o céu **sereno**." \`branca\` e \`sereno\` são ADNs)*

---

### 2) Exercícios
1. Explique no caderno a diferença morfossintática da palavra **vento** na frase *"O vento soprava"*.
2. No verso *"...sacudia a branca escuma..."*, identifique o **objeto direto**, o seu núcleo e os seus adjuntos adnominais.
3. Classifique a função sintática dos termos destacados abaixo:
   * a) *"**Eu** me lembro"*
   * b) *"disse **a minha mãe**"*

* **Gabarito/Critério para o Professor**:
  1. Morfologicamente, **vento** é um **substantivo**. Sintaticamente, é o **sujeito** da oração.
  2. No verso *"...sacudia a branca escuma..."*: Objeto Direto: **a branca escuma**; Núcleo: **escuma**; Adjuntos adnominais: **a** (artigo) e **branca** (adjetivo).
  3. Funções sintáticas:
     - a) *Eu* -> **sujeito** (núcleo do sujeito).
     - b) *a minha mãe* -> **objeto indireto**.

---

### 3) Tarefa de casa

        const aula4_8Text = `# 8º Ano — Aula 4: Predicação Verbal e Conectivos
**Texto de Ancoragem**: *"Deus"* (Casimiro de Abreu)  
**Objetivo**: Compreender as funções sintáticas verbais (predicação) e o papel relacional dos conectivos (preposições e conjunções) na oração.

---

### 1) Conteúdo

* **Predicação Verbal**: Analisa como o verbo se relaciona com seus complementos:
  1. **Verbo Intransitivo (VI)**: Possui sentido completo, não exigindo complementos obrigatórios. *(Ex: "brincava **na praia**" — \`brincava\` é VI)*
  2. **Verbo Transitivo Direto (VTD)**: Exige complemento sem preposição obrigatória (Objeto Direto). *(Ex: "...sacudia **a branca escuma**" — \`sacudia\` é VTD)*
  3. **Verbo Transitivo Indireto (VTI)**: Exige complemento precedido de preposição obrigatória (Objeto Indireto). *(Ex: "...olhou **p’ra os céus**" — \`olhou\` é VTI)*
  4. **Verbo de Ligação (VL)**: Não indica ação; liga o sujeito a um estado ou qualidade (Predicativo do Sujeito). *(Ex: "Era **pequeno**" — \`era\` é VL)*
* **Conectivos (Preposição e Conjunção)**: São classes relacionais que unem palavras (preposições) ou orações (conjunções), estabelecendo nexos de sentido e dependência sintática.

---

### 2) Exercícios
1. Identifique no caderno a predicação do verbo *bramia* na oração *"o mar bramia"* e do verbo *era* na oração *"Era pequeno"*.
2. No verso *"E eu disse a minha mãe nesse momento"*, classifique a predicação do verbo *disse* e aponte os seus complementos.
3. Identifique a conjunção aditiva presente no verso *"E brincava na praia"* e explique sua função de ligação.

* **Gabarito/Critério para o Professor**:
  1. \`bramia\` -> **verbo intransitivo** (VI), pois tem sentido completo. \`era\` -> **verbo de ligação** (VL), ligando o sujeito oculto a sua característica "pequeno".
  2. \`disse\` -> **verbo transitivo direto e indireto** (VTDI). O objeto indireto é *"a minha mãe"*, e o objeto direto é a pergunta do menino.
  3. Conjunção aditiva: **E**. Une a oração *"brincava na praia"* à oração anterior, somando ações do eu lírico.

---

### 3) Tarefa de casa

* **Questão 1**: No verso *"...Era **pequeno**"*, a palavra destacada funciona sintaticamente como:

  * **Gabarito**: d

* **Questão 3**: Na fala da mãe, *"...meu filho, **é** – Deus!"*, o verbo destacado funciona como:

  * b) Verbo Transitivo Direto
  * c) Verbo de Ligação
  * d) Verbo Transitivo Indireto

* **Questão 4**: Em *"...olhou **p’ra os céus**"*, o termo destacado funciona sintaticamente como:

  * b) Adjunto Adverbial de Direção/Lugar
  * c) Predicativo do Sujeito
  * d) Objeto Indireto
  * **Gabarito**: b

* **Questão 5**: No verso *"...sacudia a branca escuma..."*, o verbo *sacudia* classifica-se como:
  * a) Transitivo Direto
  * b) Transitivo Indireto
  * c) Intransitivo

        const aula5_8Text = `# 8º Ano — Aula 5: Análise de Orações (Simples e Complexas)
**Texto de Ancoragem**: *"Deus"* (Casimiro de Abreu)  
**Objetivo**: Analisar a estrutura morfossintática em períodos simples e compostos, associando orações adjetivas e adverbiais às suas funções.

---

### 1) Conteúdo

* **Período Simples vs. Período Composto**:
  * **Período Simples**: Apresenta apenas uma oração (um único verbo). Os termos ligam-se diretamente ao verbo ou nome principal.
    * *Exemplo*: *"O menino pequeno brincava na praia."*
  * **Período Composto**: Contém mais de uma oração. As orações subordinadas exercem funções equivalentes a termos simples (substantivos, adjetivos ou advérbios).
    * *Exemplo*: *"O menino, **que era pequeno**, brincava na praia."*
* **Orações Adjetivas e Adjuntos Adnominais**: Orações que caracterizam substantivos funcionam sintaticamente como adjuntos adnominais.
  * *Exemplo*: In *"Um Ser **que nós não vemos**..."*, a oração adjetiva equivale ao adjetivo *invisível* e atua como adjunto adnominal do substantivo *Ser*.

---

### 2) Exercícios
1. Reduza o período composto a seguir em período simples no caderno, transformando a oração subordinada em um adjetivo correspondente:
   > *"O menino, que era pequeno, brincava na praia."*
2. No verso *"Um Ser que nós não vemos..."*, identifique o sujeito da oração destacada.
3. Transforme a locução adjetiva em um adjetivo simples equivalente: *"erguendo o dorso de rei"*.

* **Gabarito/Critério para o Professor**:
  1. Período simples: *"O menino **pequeno** brincava na praia."* (A oração adjetiva *"que era pequeno"* vira o adjetivo *"pequeno"*).
  2. O sujeito da oração destacada é o pronome pessoal **nós**.
  3. Dorso de rei = dorso **real** ou **régio**.

---

### 3) Tarefa de casa

* **Questão 1**: No verso *"E eu disse **a minha mãe**..."*, o termo em destaque é classificado sintaticamente como:
  * a) Sujeito
  * b) Objeto Direto
  * c) Objeto Indireto
  * d) Adjunto Adnominal
  * **Gabarito**: c

* **Questão 2**: Qual é a função sintática do pronome relativo *"que"* na oração *"Um Ser **que** nós não vemos"*? (Dica: substitua "que" por "Ser" na oração: *"nós vemos o Ser"*).
  * a) Sujeito
  * b) Objeto Direto
  * c) Objeto Indireto
  * d) Adjunto Adnominal
  * **Gabarito**: b

* **Questão 3**: Na frase *"O mar **que nós tememos** é imenso"*, a oração em destaque funciona sintaticamente como adjunto adnominal de:
  * a) nós
  * b) mar
  * c) imenso
  * d) é
  * **Gabarito**: b

* **Questão 4**: Na frase *"O menino, **quando olhou para o céu**, sorriu."*, a oração em destaque expressa circunstância de:
  * a) causa
  * b) tempo
  * c) oposição
  * d) consequência
  * **Gabarito**: b

* **Questão 5**: O período *"Minha mãe olhou para os céus e respondeu."* classifica-se como composto por coordenação porque contém:
  * a) orações dependentes sintaticamente
  * b) duas orações independentes ligadas pela conjunção "e"
  * c) apenas um verbo
  * d) uma oração principal e uma subordinada
  * **Gabarito**: b
`;
        const aula6_8Text = `# 8º Ano — Aula 6: Morfossintaxe Aplicada (Texto "Deus")
**Texto de Ancoragem**: *"Deus"* (Casimiro de Abreu)  
**Objetivo**: Realizar a revisão integradora de funções sintáticas e predicação verbal aplicadas diretamente sobre o texto de ancoragem.

---

### 1) Conteúdo

* **Mapeamento de Funções Sintáticas no Poema**:
  * **Sujeito**: *mar* (em *"o mar bramia"*), *nós* (em *"que nós não vemos"*).
  * **Objeto Direto**: *escuma* (em *"...sacudia a branca escuma..."*).
  * **Objeto Indireto**: *mãe* (em *"E eu disse a minha mãe..."*).
  * **Predicativo do Sujeito**: *pequeno* (em *"Era pequeno"*), *Deus* (em *"...é – Deus!"*).
  * **Adjunto Adnominal**: *branca* (de *escuma*), *altivo* (de *dorso*), *sereno* (de *céu*).
  * **Adjunto Adverbial**: *na praia* (lugar em *"brincava na praia"*), *nesse momento* (tempo em *"disse... nesse momento"*).

---

### 2) Exercícios
1. Identifique no caderno a função sintática e a classificação morfológica de cada termo da oração:

3. Identifique o sujeito do verbo **vemos** no verso: *"que nós não vemos"*.

* **Gabarito/Critério para o Professor**:
  1. Morfologicamente: \`O\` -> artigo; \`mar\` -> substantivo; \`bramia\` -> verbo. Sintaticamente: \`O\` -> adjunto adnominal; \`mar\` -> sujeito; \`bramia\` -> predicado (VI).
  2. Predicação de \`disse\` -> **transitivo direto e indireto** (VTDI); Objeto Indireto: **a minha mãe**.

            }
          } catch (e) {
            content = source.fallback; // Fallback se CORS bloquear file://
          }

          // Processamento dos Gabaritos
          if (sourceKey.endsWith('_aluno')) {
            // Remove todo o bloco de gabarito para a visão do aluno
            content = content.replace(/<!-- INICIO_GABARITO -->[\s\S]*?<!-- FIM_GABARITO -->/g, '');
              // Fallback para aulas não convertidas ainda
              content = content.replace(/^[ \t]*\*?[ \t]*\*\*Gabarito.*\r?\n?/gim, '');
          } else {
            // Envolve as respostas em uma div de destaque para o professor
            content = content.replace(/<!-- INICIO_GABARITO -->/g, '<div class="gabarito-prof" style="background-color: var(--accent-light); padding: 15px; margin: 15px 0; border-radius: 4px; border-left: 4px solid var(--accent);">\n\n');
            content = content.replace(/<!-- FIM_GABARITO -->/g, '\n\n</div>');
          }

          document.getElementById(targetElementId).innerHTML = marked.parse(content);
        }

        // Gerenciador de Abas Principais
        function showTab(tabName) {
          currentTab = tabName;
          document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));

          // Ativa link e painel
          event.target.classList.add('active');
          document.getElementById(`panel-${tabName}`).classList.add('active');

          // Carregamento sob demanda
          if (tabName === 'matriz') {
            loadAndRenderMarkdown('matriz', 'matriz-render');
          } else if (tabName === 'cronogramas') {
            loadAndRenderMarkdown(`cronograma${currentCronogramaYear}`, 'cronograma-render');
          }
        }

        // Sub-navegação de Anos na aba Cronogramas
        async function changeCronogramaYear(year, element) {
          currentCronogramaYear = year;
          element.parentNode.querySelectorAll('.sub-link').forEach(btn => btn.classList.remove('active'));
          element.classList.add('active');
          await loadAndRenderMarkdown(`cronograma${year}`, 'cronograma-render');
        }

        // --- LÓGICA DO MODAL DE LIÇÕES ---
        let currentModalLessonKey = null;

        async function openLessonModal(key) {
          currentModalLessonKey = key;
          const modal = document.getElementById('lesson-modal');
          const sourceKey = `${key}_${lessonVersion}`;
          await loadAndRenderMarkdown(sourceKey, 'modal-content-render');
          modal.showModal();
        }

        function closeLessonModal() {
          const modal = document.getElementById('lesson-modal');
          modal.close();
          currentModalLessonKey = null;
        }

        async function setLessonVersion(version) {
          lessonVersion = version;
          document.querySelectorAll('.toggle-option').forEach(el => el.classList.remove('active'));
          if (version === 'aluno') {
            document.getElementById('toggle-aluno').classList.add('active');
          } else {
            document.getElementById('toggle-prof').classList.add('active');
          }

          // Se o modal estiver aberto, recarrega o conteúdo com a versão correta
          if (currentModalLessonKey) {
            const sourceKey = `${currentModalLessonKey}_${lessonVersion}`;
            await loadAndRenderMarkdown(sourceKey, 'modal-content-render');
          }
        }


      </script>

</body>
